import { PretextEngine } from '../../js/pretext-engine.js?v=deb88955'
const BLOCKS=[{"type": "heading", "level": 1, "text": "My Argument"}, {"type": "heading", "level": 2, "text": "In Favor of Working Together.", "id": "in-favor-of-working-together"}, {"type": "image", "src": "../../Media/Images/jl-site-logo-fancy.svg", "alt": ""}, {"type": "special", "text": "For the better part of two decades, I have found myself forever preoccupied with how humans create vibrant communities of engaged citizens who know how to make positive change actually happen.\n"}, {"type": "quote", "text": "Through years of administrative and project management experience, over a  decade of multimedia content production work, and consistent learning and teaching in complex problem-spaces over that time, I have discovered a broad range of strategies and tactics; adapting always to what works and what doesn't in many different contexts. My favoured approach is always to seek community-informed-and-driven solutions.\n", "attribution": "TLDR for the Article Below."}, {"type": "button", "text": "Say Hello :)", "href": "https://wa.me/+27840408857"}, {"type": "separator", "svg": "jl-site-separator3"}, {"type": "image", "src": "../../Media/Images/jl-site-pic-myargument.webp", "alt": "JL Kruger standing just off stage, reading a script. A microphone points off to the left, away from him."}, {"type": "paragraph", "text": "Healthy democracy requires an engaged citizenry actively choosing to keep it alive with every election and by-election. If democracy teaches us anything, it is that people make decisions based on what they believe, not necessarily what they know. It is exactly at this intersection, that of belief and knowledge, where good education makes all the difference."}, {"type": "paragraph", "text": "My lived experience has taught me what it feels like when the entire system seems set up to either exploit you, ensnare you or end you, when you and your friends sit there wondering [what can we do?](https://www.youtube.com/@therenegadelens) and every attempt seems to fall apart. My life changed when I found people who modelled the agency that had always been available to me but that I had no awareness of. This journey from powerlessness to capability is at the heart of my approach to empowerment and education. For anyone to build prosperity for themselves or others, they need first to believe that such steps are possible, and have a sense of what tools and paths are available to them."}, {"type": "critter", "svg": "jl-site-critter3"}, {"type": "media", "src": "https://1drv.ms/v/c/524eeedbb443c4e2/IQDixEO02-5OIIBSsHQAAAAAAeNSx8aRY2ExWNBE9jwWJ-s?e=Knw7OC", "text": "Cognitive Flexibility"}, {"type": "paragraph", "text": "Success, to me, is establishing measurable, practical means by which hope and agency can be demonstrably restored to youth facing a far more daunting future than I was at their age. I hope to be a part of building networks of interconnected communities, empowering them with both the belief that they can make life better, and making space for them to practice actual skills and acquire the knowledge needed to realize that belief."}, {"type": "paragraph", "text": "In my view education is most effective when focused on developing practical knowledge of exactly how one can affect one's community in measurable, tangible ways. To illustrate, let me use the example of one of my favorite, undervalued fields: Civic Education. How do we learn the processes for legally adding extensions to a house? Who teaches us how organizing action in local government can be more effective, because that is where your voice is most loudly heard? Who teaches anyone how to get the courts to act on the public's behalf? When people understand how government actually works, they become less preoccupied with who's in power and more interested in what policies will shape their lives."}, {"type": "paragraph", "text": "People tend to choose according to what they believe, not necessarily according to what they know. This is why my teaching approach is focused on building well-grounded intuitions about how the world actually works and modelling the practices involved in navigating that world. Most people learn by choosing from available models and I believe that institutional leadership's role is to provide consistent, stable models that can serve as benchmarks for the public. It is a core function of a healthy institution to demonstrate that work toward a better future happens and is ongoing."}, {"type": "image", "src": "../../Media/Images/jl-site-thumbnail-projects.webp", "alt": ""}, {"type": "media", "src": "https://1drv.ms/v/c/524eeedbb443c4e2/IQDixEO02-5OIIBSpXQAAAAAAc6m9WDquzAKVbW78VXqS6g?e=s72N53", "text": "Video: Connecting with iONLINE"}, {"type": "paragraph", "text": "I bring operational capability to this challenge. My [administrative experience](../work-history) includes two years as an assistant to a Sectional Title administrator, where I compiled and drafted reports for high court submissions. This work required precise communication, sound legal understanding, and communicating effectively in complex stakeholder relationships. My work as a multimedia content producer has given me a lot of project management experience as a solo creator and as part of a team. My background as a content producer, spanning stage, screen, audio, written, and interactive media production, has equipped me with sophisticated understanding of how attention can be directed toward learning, how emotion affects memory, and how interactivity can lock concepts in the mind. [My time as Head of Media for The Learning Organisation](https://www.youtube.com/watch?v=PlUSOWSjK8U) was the catalyst for my fascination with how to improve the quality of education and outcomes in South Africa."}, {"type": "paragraph", "text": "The common thread throughout my background has been almost constant learning and teaching in complex problem-spaces with diverse stakeholders and teams. I have often worked with assistants and volunteers that need to be taught on-the-job, as well as teaching in more structured, classroom scenarios. I favour community-informed, grassroots-driven solutions and modular, adaptable curricula. I am forever on the search of opportunities to deliver education based on honest assessments of what actually builds engaged citizens capable of full participation in community and civic life."}, {"type": "paragraph", "text": "Thank you for your reading. If you would like to work together on something, please get in touch."}, {"type": "image", "src": "../../Media/Images/jl-site-thumbnail-raft.webp", "alt": ""}, {"type": "separator", "svg": "jl-site-separator4"}, {"type": "button", "text": "Begin a Correspondence", "href": "mailto:jlkruger@3scfoundations.org?subject=Ahoy%20there%2C%20Website%20Email&body=Hello%2C%20Put%20your%20message%20below%20this%20line."}, {"type": "link-row", "links": [{"text": "Current Projects", "href": "../../Content/Business/CurrentProjects.html"}, {"text": "Skills & Rates", "href": "../../Content/Business/SkillsRates.html"}, {"text": "Work History", "href": "../../Content/Business/WorkHistory.html"}, {"text": "Communities & Collaborators", "href": "../../Content/Business/CommunitiesCollaborators.html"}]}, {"type": "critter", "svg": "jl-site-critter2"}, {"type": "image", "src": "../../Media/Images/Burner-gallery/jl-site-gallery-burner_6.webp", "alt": ""}, {"type": "image", "src": "../../Media/Images/jl-site-logo-fancy.svg", "alt": ""}]

<script>
// ── Sidebar toggle ─────────────────────────────────────────────────────────
const _sb=document.getElementById('sidebar')
const _st=document.getElementById('sidebar-toggle')
if(_sb&&_st){
  _st.addEventListener('click',()=>{
    const hidden=_sb.classList.toggle('hidden')
    _st.textContent=hidden?'▶':'◀'
  })
}
// ── Section tracking ───────────────────────────────────────────────────────
const _navLinks=[...document.querySelectorAll('.section-nav a')]
if(_navLinks.length){
  const _sc=document.getElementById('scroll-container')
  const _setActive=id=>{
    _navLinks.forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+id))
  }
  const _io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)_setActive(e.target.id)})
  },{root:_sc,rootMargin:'0px 0px -60% 0px',threshold:0})
  const _trackSections=()=>{
    document.querySelectorAll('[id]').forEach(el=>{
      if(_navLinks.some(a=>a.getAttribute('href')==='#'+el.id))_io.observe(el)
    })
  }
  document.addEventListener('pretext:done',_trackSections,{once:true})
  setTimeout(_trackSections,2000)
}

// ── Lightbox close ─────────────────────────────────────────────────────
const _lb=document.getElementById('lightbox')
const _lc=document.getElementById('lightbox-close')
if(_lb&&_lc){
  _lc.addEventListener('click',()=>{_lb.classList.remove('open');const fr=document.getElementById('lightbox-frame');if(fr)setTimeout(()=>{fr.src=''},300)})
  _lb.addEventListener('click',e=>{if(e.target===_lb)_lb.classList.remove('open')})
}
// ── Mobile hamburger ────────────────────────────────────────────────────
const _ham=document.getElementById('mobile-hamburger')
const _stickyNav=document.querySelector('.sticky-nav')
if(_ham&&_stickyNav){
  _ham.addEventListener('click',()=>{
    const open=_stickyNav.classList.toggle('nav-open')
    _ham.setAttribute('aria-expanded',open)
  })
  if(window.registerGradientInteraction)window.registerGradientInteraction(_ham)
}
// ── Section nav FAB (mobile) ────────────────────────────────────────────
const _fab=document.getElementById('section-nav-fab')
const _sheet=document.getElementById('section-nav-sheet')
if(_fab&&_sheet){
  if(window.registerGradientInteraction)window.registerGradientInteraction(_fab)
  _fab.addEventListener('click',()=>{
    const open=_sheet.classList.toggle('open')
    _fab.setAttribute('aria-expanded',open)
    _sheet.setAttribute('aria-hidden',!open)
  })
  _sheet.querySelectorAll('a').forEach(a=>{
    a.addEventListener('click',()=>{
      _sheet.classList.remove('open')
      _fab.setAttribute('aria-expanded','false')
      _sheet.setAttribute('aria-hidden','true')
    })
  })
}
</script>
