<script type="module">
import { PretextEngine } from '../../js/pretext-engine.js?v=c0e59ff8'
const BLOCKS=[{"type": "heading", "level": 1, "text": "Skills & Rates"}, {"type": "image", "src": "../../Media/Images/jl-site-logo-fancy.svg", "alt": ""}, {"type": "separator", "svg": "jl-site-separator4"}, {"type": "paragraph", "text": "I'm a Jo'burg-based independent multimedia practitioner and community builder. I have over sixteen years of multimedia production experience, alongside ten years of administrative, project and system support experience, in entertainment civic education, community engagement, and other complex stakeholder environments across Southern Africa. I am happy to work both  on-site and remotely, pursuant to client needs and logistical realities."}, {"type": "image", "src": "../../Media/Images/jl-site-pic-portrait.webp", "alt": ""}, {"type": "button", "text": "Contact Information", "href": "../../Content/Business/ContactPage.html"}, {"type": "button", "text": "Work History", "href": "../../Content/Business/WorkHistory.html"}, {"type": "critter", "svg": "jl-site-critter1"}, {"type": "special", "text": "A Business Note:"}, {"type": "paragraph", "text": "I am willing to negotiate rates, and to quote on a  project pro-bono, but I will not begin any paid work without a  signed *Scope of Work* and *Service Level Agreement* in place. I  typically require a 15%-50% Deposit, depending on a quoted and  approved budget for the work. I am also open to employment  contracts, depending, of course, on the terms and conditions, etc. I am always negotiable, and so I have a lot of negotiating experience."}, {"type": "separator", "svg": "jl-site-separator5"}, {"type": "heading", "level": 4, "text": "Click any heading below to expand it."}, {"type": "heading", "level": 2, "text": "Independent & Community Work", "id": "independent-community-work"}, {"type": "image", "src": "../../Media/Images/WorkHistory-gallery/jl-site-gallery-workhistory16.webp", "alt": ""}, {"type": "accordion", "cards": [{"title": "Multimedia Content Production", "description": "I produce interactive, written, audio, and video content. Capable of stewarding projects from concept through to delivery, or any part thereof.", "content": [{"type": "paragraph", "text": "I organize and provide documentary, educational, and fiction content  development and production, in whole or in part. I have  over sixteen years of experience across stage, screen, audio and  digital media. I have a strong preference for work that contributes  to meaningful skills development and community empowerment.\n"}, {"type": "paragraph", "text": "Scope of services include (but aren't limited to) :\n- concept research and development, \n- writing and editing:\n  - content and copy\n  - proposals, treatments and design documents\n  - specifications, guides and agent scaffolding, \n  - reporting, communications and project documentation\n- project administration and logistics, \n- multimedia content packages:\n  - videos\n  - audio\n  - graphics\n  - interactive objects and experiences\n  - websites, courses and games\n"}, {"type": "table", "headers": ["Engagement", "Standard", "Community Rate"], "rows": [["Pre-production/Rehearsal/Testing", "from R2,500 per day", "up to R 1000.00 per day"], ["Production Day Rate", "from R4,400", "R 3000.00"], ["Writing & Editing (up to 3x Revisions)", "R3,500 per 1000 finished words.", "R1,200 per 1000 finished words"], ["Project estimate", "on request", "on request"]]}, {"type": "paragraph", "text": "My current preoccupation is designing and deploying interactive  experiences that combine digital, online, analogue and practical  components. I'm happy to provide turnkey solutions or to integrate  with your team. \n"}]}, {"title": "Smartphone & Internet Safety", "description": "Practical safety sessions for individuals, families and community groups.", "content": [{"type": "paragraph", "text": "Hands-on, tailored sessions covering social media privacy, scam and phishing recognition, AI-generated content concerns, data practices, and safe smartphone habits. Designed for people who use technology daily but didn't get a manual. Delivered in plain language; no jargon required.\n"}, {"type": "paragraph", "text": "For individuals, buy a seat and redeem it on a class of your choice (you'll get updates on the whens and wheres for as long as you have an unredeemed seat). For class prices to kick in, you need  to book a minimum of 7 seats, up to a maximum of 12.\n"}, {"type": "table", "headers": ["Engagement", "Sponsor Rate", "Community Rate"], "rows": [["Module (1hr) seat price", "R 400", "R250"], ["Module (1hr) class price", "R 2500", "R1,500"], ["Workshop (3hrs) seat price", "R 1100", "R750"], ["Workshop (3hrs) class price", "R 6000", "R4500"], ["Training Day (6hrs) seat price", "R 1800", "R1200"], ["Training Day (6hrs) class price", "R 11 000", "R 8 000"], ["Custom course materials development", "on request", "on request"]]}]}, {"title": "Multimedia Content Production Training", "description": "Workshops for Teams, Individuals and Creative Groups designed to save time, money and sanity from costly and careless mistakes. How to get it done, get it published, get it seen.", "content": [{"type": "paragraph", "text": "You and your team have things to say to the world. Every business, most organizations, and many individuals, have a need to make good content efficiently, quickly and, importantly, consistently. The algorithm is a hungry beast and burnout is a career-ender. Doing multimedia production well begins with simple steps and systems, and a little dash of wisdom. I can work with you and your team to identify the skills you need to level up your content creation and then I can build a training programme to teach those skills.\n"}, {"type": "paragraph", "text": "For individuals, buy a seat and redeem it at a class of your choice (you'll get updates on the whens and wheres for as long as you have an unredeemed seat). For class prices to kick in, you need  to book a minimum of 7 seats, up to a maximum of 12.\n"}, {"type": "table", "headers": ["Engagement", "Sponsor Rate", "Community Rate"], "rows": [["Workshop (3hrs) seat price", "R 1 100", "R 750"], ["Workshop (3hrs) class price", "R 6 000", "R4 500"], ["Training Day (6hrs) seat price", "R 1 800", "R1 200"], ["Training Day (6hrs) class price", "R 11 000", "R 8 000"], ["Bootcamp (4 days) seat price", "R 6 000", "R 3 600"], ["Bootcamp (4 days) class price", "R 36 000", "R 22 000"], ["Custom course materials development", "on request", "on request"]]}]}, {"title": "Facilitation & Community Engagement", "description": "Workshop facilitation and participatory process design for diverse groups.", "content": [{"type": "paragraph", "text": "Comfortable with difficult rooms. Experience in civic education, grassroots organising, and complex stakeholder dynamics.\n"}, {"type": "table", "headers": ["Engagement", "Standard", "Community Rate"], "rows": [["Half-day facilitation (up to 3hrs)", "R4,500", "R3,000"], ["Full day facilitation", "R7,500", "R5,000"], ["Design & prep day", "R3,500", "R2,400"]]}]}, {"title": "Managed Hosting & Server Services", "description": "VPS setup and maintenance for small businesses and NGOs.", "content": [{"type": "paragraph", "text": "Local or cloud VPS setup, configuration, and ongoing maintenance. Domain configuration, SSL, CMS installation, automated backups, and uptime monitoring. Support calls billed by the minute — short calls stay cheap.\n"}, {"type": "paragraph", "text": "Hosting providers I work with: [Afrihost](https://www.afrihost.com) (SA-based) and [Hetzner](https://www.hetzner.com) (EU, best price-performance for less latency-sensitive workloads).\n"}, {"type": "table", "headers": ["Service", "Fee", "Notes"], "rows": [["Setup (once-off)", "R2,500 – R4,500", "Complexity-dependent. Includes config, domain, SSL, CMS install."], ["Monthly retainer", "R750 – R1,400", "Monitoring, updates, backups. Hosting cost additional."], ["Support call", "R420/hr billed per minute", "Minimum R175 per call."]]}]}, {"title": "Got something else in mind?", "description": "A bit of video, a bit of facilitation, a small site that needs keeping alive.", "content": [{"type": "paragraph", "text": "If your project is an odd shape, get in touch anyway. I am generally interested in work that makes things better, and I would rather have a short conversation than have you spend time wondering if I am the right person.\n"}, {"type": "button", "text": "Get in Touch", "href": "/Content/Business/ContactPage.html"}]}]}, {"type": "separator", "svg": "jl-site-separator5"}, {"type": "image", "src": "../../Media/Images/jl-site-pic-myargument.webp", "alt": ""}, {"type": "button", "text": "Contact Information", "href": "../../Content/Business/ContactPage.html"}, {"type": "button", "text": "Work History", "href": "../../Content/Business/WorkHistory.html"}, {"type": "separator", "svg": "jl-site-separator6"}, {"type": "heading", "level": 2, "text": "Consulting & Institutional", "id": "consulting-institutional"}, {"type": "image", "src": "../../Media/Images/jl-site-pic-skills.webp", "alt": ""}, {"type": "accordion", "cards": [{"title": "Stakeholder Communications & Content Strategy", "description": "Research, writing and strategic framing for complex and diverse audiences.", "content": [{"type": "paragraph", "text": "Reports, policy briefs, public-facing communications, stakeholder consultation materials, and donor-facing content. Comfortable with ESG, just-transition, B-BBEE-aligned community investment, and civic-tech contexts.\n"}, {"type": "table", "headers": ["Engagement", "Standard", "Partner Rate"], "rows": [["Day rate", "$500", "$340"], ["Project estimate", "on request", "on request"]]}]}, {"title": "Curriculum & Instructional Design", "description": "Adult and community learning programme design for complex problem-spaces.", "content": [{"type": "paragraph", "text": "Modular and adaptable curricula for diverse learner cohorts. Classroom, workshop, and interactive digital formats. Community-informed approach throughout.\n"}, {"type": "table", "rates_public": true, "headers": ["Engagement", "Standard", "Partner Rate"], "rows": [["Day rate (design & development)", "$500", "$340"], ["Facilitated delivery day", "$550", "$380"], ["Full programme scoping & design", "on request", "on request"]]}]}, {"title": "NGO Grants, Proposals & Reporting", "description": "Funding proposals, grant reports, and funder communications.", "content": [{"type": "paragraph", "text": "EU, UN, foundation, and bilateral donor formats. Strong on precision, deadline compliance, and translating complex work into funder language. Experience drafting for high-stakes submissions including court-level documents.\n"}, {"type": "table", "headers": ["Engagement", "Standard", "Partner Rate"], "rows": [["Hourly (editing", "short briefs)", "$35/hr", "$22/hr"], ["Day rate (research & drafting)", "$220", "$180"], ["Major proposal (institutional)", "from $2,500", "from $1,750"]]}]}, {"title": "Project & Programme Support", "description": "Operational and administrative support for funded programme delivery.", "content": [{"type": "paragraph", "text": "Planning, reporting, stakeholder coordination, and documentation. Comfortable in embedded team roles on named projects. Regulatory and compliance documentation experience, including legal submissions.\n"}, {"type": "table", "headers": ["Engagement", "Standard", "Partner Rate"], "rows": [["Day rate", "$450", "$310"], ["Embedded project role (per week)", "$1,800", "$1,250"], ["Retainer (minimum 3 months)", "on request", "on request"]]}]}]}, {"type": "separator", "svg": "jl-site-separator3"}, {"type": "paragraph", "text": "**A note on fit.** My practice is built around civic education and community empowerment, so a few categories are outside what I will write or produce: advertising for gambling, cryptocurrency or speculative token promotions, products marketed at under-16s that are not genuinely educational, and unregulated health products not covered by SAHPRA or an equivalent regulator. Happy to refer you on if that is your brief."}, {"type": "separator", "svg": "jl-site-separator1"}, {"type": "link-row", "links": [{"text": "Current Projects", "href": "../../Content/Business/CurrentProjects.html"}, {"text": "Communities & Collaborators", "href": "../../Content/Business/CollaboratorsCommunities.html"}, {"text": "My Argument", "href": "../../Content/Writings/MyArgument.html"}, {"text": "Contact", "href": "../../Content/Business/ContactPage.html"}]}]

<script>
// ── Sidebar toggle ─────────────────────────────────────────────────────────
const _sb=document.getElementById('sidebar')
const _st=document.getElementById('sidebar-toggle')
if(_sb&&_st){
  _st.addEventListener('click',()=>{
    const hidden=_sb.classList.toggle('hidden')
    _st.textContent=hidden?'▶':'◀'
  })
}
// ── Section tracking ───────────────────────────────────────────────────────
const _navLinks=[...document.querySelectorAll('.section-nav a')]
if(_navLinks.length){
  const _sc=document.getElementById('scroll-container')
  const _setActive=id=>{
    _navLinks.forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+id))
  }
  const _io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)_setActive(e.target.id)})
  },{root:_sc,rootMargin:'0px 0px -60% 0px',threshold:0})
  const _trackSections=()=>{
    document.querySelectorAll('[id]').forEach(el=>{
      if(_navLinks.some(a=>a.getAttribute('href')==='#'+el.id))_io.observe(el)
    })
  }
  document.addEventListener('pretext:done',_trackSections,{once:true})
  setTimeout(_trackSections,2000)
}

// ── Lightbox close ─────────────────────────────────────────────────────
const _lb=document.getElementById('lightbox')
const _lc=document.getElementById('lightbox-close')
if(_lb&&_lc){
  _lc.addEventListener('click',()=>{_lb.classList.remove('open');const fr=document.getElementById('lightbox-frame');if(fr)setTimeout(()=>{fr.src=''},300)})
  _lb.addEventListener('click',e=>{if(e.target===_lb)_lb.classList.remove('open')})
}
// ── Mobile hamburger ────────────────────────────────────────────────────
const _ham=document.getElementById('mobile-hamburger')
const _stickyNav=document.querySelector('.sticky-nav')
if(_ham&&_stickyNav){
  _ham.addEventListener('click',()=>{
    const open=_stickyNav.classList.toggle('nav-open')
    _ham.setAttribute('aria-expanded',open)
  })
  if(window.registerGradientInteraction)window.registerGradientInteraction(_ham)
}
// ── Section nav FAB (mobile) ────────────────────────────────────────────
const _fab=document.getElementById('section-nav-fab')
const _sheet=document.getElementById('section-nav-sheet')
if(_fab&&_sheet){
  if(window.registerGradientInteraction)window.registerGradientInteraction(_fab)
  _fab.addEventListener('click',()=>{
    const open=_sheet.classList.toggle('open')
    _fab.setAttribute('aria-expanded',open)
    _sheet.setAttribute('aria-hidden',!open)
  })
  _sheet.querySelectorAll('a').forEach(a=>{
    a.addEventListener('click',()=>{
      _sheet.classList.remove('open')
      _fab.setAttribute('aria-expanded','false')
      _sheet.setAttribute('aria-hidden','true')
    })
  })
}
</script>
