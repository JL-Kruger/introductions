<script>
  // SVG center for rotation pivot
  const CX = 452.16, CY = 452.16;

  // Base: 1 revolution / 16s = 22.5 deg/s  (quarter of original)
  // Hover: 4x = 90 deg/s
  const BASE_SPEED  = 22.5;
  const HOVER_SPEED = 90;

  // Subtle per-gradient drift multipliers — close to 1.0, slightly above/below
  const gradients = [
    { id: 'linearGradient5021', drift: 0.94 },
    { id: 'linearGradient5055', drift: 1.03 },
    { id: 'linearGradient5063', drift: 0.98 },
    { id: 'linearGradient5085', drift: 1.06 },
    { id: 'linearGradient5093', drift: 1.00 },
  ];

  const wrap = document.getElementById('logo-wrap');

  // Each gradient tracks its own angle
  const angles = gradients.map(() => 0);

  let isHovered    = false;
  let lastTime     = null;
  let currentSpeed = BASE_SPEED;

  wrap.addEventListener('mouseenter', () => { isHovered = true;  });
  wrap.addEventListener('mouseleave', () => { isHovered = false; });
  wrap.addEventListener('touchstart', () => { isHovered = true;  }, { passive: true });
  wrap.addEventListener('touchend',   () => { isHovered = false; }, { passive: true });

  function tick(timestamp) {
    if (lastTime === null) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    const targetSpeed = isHovered ? HOVER_SPEED : BASE_SPEED;
    currentSpeed += (targetSpeed - currentSpeed) * Math.min(4 * dt, 1);

    gradients.forEach(({ id, drift }, i) => {
      angles[i] = (angles[i] + currentSpeed * drift * dt) % 360;
      const el = document.getElementById(id);
      if (el) el.setAttribute('gradientTransform', `rotate(${angles[i]} ${CX} ${CY})`);
    });

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
</script>
