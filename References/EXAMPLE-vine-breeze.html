<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#0d0a08;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #container{width:100%;max-width:900px;padding:2rem;cursor:crosshair;user-select:none;-webkit-user-select:none}
  #container svg{width:100%;height:auto;display:block;overflow:visible}
  #dbg{display:none;position:fixed;top:1.5rem;right:1.5rem;z-index:9999;background:#080808;border:1px solid #222;border-radius:2px;width:280px;padding:1rem;font-family:'Share Tech Mono',monospace;box-shadow:0 0 40px rgba(0,0,0,0.8);max-height:90vh;overflow-y:auto}
  #dbg.open{display:block}
  #dbg h2{font-size:.68rem;letter-spacing:.12em;color:#444;margin-bottom:.6rem;text-transform:uppercase}
  .sg{font-size:.6rem;letter-spacing:.1em;color:#3ddc84;text-transform:uppercase;margin:.7rem 0 .4rem;border-top:1px solid #1a1a1a;padding-top:.6rem}
  .sp{display:flex;flex-direction:column;gap:.15rem;margin-bottom:.55rem}
  .sp label{font-size:.6rem;color:#444;display:flex;justify-content:space-between;letter-spacing:.03em}
  .sp label span{color:#f2c62a}
  .sp input[type=range]{width:100%;accent-color:#3ddc84;height:2px;cursor:pointer;margin-top:2px}
  #dbg-reset{margin-top:.6rem;width:100%;background:transparent;border:1px solid #222;color:#444;font-family:inherit;font-size:.62rem;letter-spacing:.07em;padding:.4rem;cursor:pointer;border-radius:2px;transition:border-color .15s,color .15s}
  #dbg-reset:hover{border-color:#3ddc84;color:#3ddc84}
  #dbg-hint{font-size:.56rem;color:#2a2a2a;margin-top:.6rem;text-align:center;letter-spacing:.05em}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#080808}::-webkit-scrollbar-thumb{background:#222}
</style>
</head>

(function(){
  const map = [
    ['tsk','stemTipStiff',3],['tdk','stemTipDamp',2],['tbk','stemTipBoop',2],
    ['bsk','stemBodyStiff',3],['bdk','stemBodyDamp',2],
    ['bf','breezeF',2],['bi','boopImp',2],['rk','rootChainK',3],
    ['rm','rootChainMax',0],
    ['fd','frillDamp',2],['fr','frillMaxRot',1],
    ['ds','ringDurScale',2],['hg','ringDelay',0],
    ['r1','ring1MaxR',0],['rv','ring2VelRatio',2],['vd','vineDecayMult',2],
    ['sc','snapCount',0],['si','snapInterval',0],['sd','snapDecay',0],['tr','trailResetN',0],
  ];
  for(const [k,p,dp] of map){
    const sl=document.getElementById('s-'+k);
    const vl=document.getElementById('v-'+k);
    if(!sl) continue;
    sl.addEventListener('input',()=>{
      PARAMS[p]=parseFloat(sl.value);
      vl.textContent=parseFloat(sl.value).toFixed(dp);
    });
  }
  // Pulse interval: 0 displays as "off"
  (function(){
    const sl=document.getElementById('s-pi'),vl=document.getElementById('v-pi');
    sl.addEventListener('input',()=>{
      PARAMS.pulseInterval=parseFloat(sl.value);
      vl.textContent=PARAMS.pulseInterval===0?'off':PARAMS.pulseInterval.toFixed(0);
    });
  })();

  document.getElementById('dbg-reset').addEventListener('click',()=>{
    Object.assign(PARAMS,DEFAULTS);
    for(const [k,p,dp] of map){
      const sl=document.getElementById('s-'+k);
      if(!sl) continue;
      sl.value=PARAMS[p];
      document.getElementById('v-'+k).textContent=PARAMS[p].toFixed(dp);
    }
    document.getElementById('s-pi').value=PARAMS.pulseInterval;
    document.getElementById('v-pi').textContent=PARAMS.pulseInterval===0?'off':PARAMS.pulseInterval.toFixed(0);
  });
  const held=new Set();
  document.addEventListener('keydown',e=>{
    held.add(e.key.toLowerCase());
    if(e.ctrlKey && held.has('a') && held.has('l')){
      e.preventDefault();
      document.getElementById('dbg').classList.toggle('open');
    }
  });
  document.addEventListener('keyup',e=>held.delete(e.key.toLowerCase()));
})();

// ── Runtime ───────────────────────────────────────────────────────────────────
(function(){
  'use strict';
  const svgEl    = document.getElementById('jl-ci');
  const PI2      = Math.PI * 2;
  const RAD2DEG  = 180 / Math.PI;
  const PHI      = 1.6180339887498950;
  const SVG_W    = 654.81134;
  const SVG_H    = 520.48334;
  const FPS_N    = 16.6667;
  const TOKS     = new Set(['nx','ny','cp1x','cp1y','cpinx','cpiny']);

  function sr(s){ return Math.abs(Math.sin(s*127.1+311.7)*43758.5453)%1; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  // ── State init ─────────────────────────────────────────────────────────────
  const states={}, byId={};

  VD.physicsElements.forEach((def,idx)=>{
    byId[def.id]=def;
    const seed=idx*7+3;
    const period1=3800+sr(seed)*2500;
    const phase1=sr(seed+50)*PI2;
    const phase2=sr(seed+100)*PI2;
    const domEl=document.getElementById(def.id);

    if(def.elType==='circle'){
      states[def.id]={
        def,domEl,period1,phase1,phase2,
        lpx:def.cx-(def.layerTx?def.layerTx.x:0), lpy:def.cy-(def.layerTx?def.layerTx.y:0),
        sOff:0, sv:0, boopActive:false,
        holdUntil:0, cooldownUntil:0,
      };
      return;
    }

    const nodes=def.nodes;
    const isStem=def.physicsType==='stem';

    if(isStem){
      // Stem: mutable node array, d rebuilt each frame
      const mnodes=nodes.map((n,i)=>({
        x:n.x, y:n.y, vx:0, vy:0,
        restX:n.x, restY:n.y,
        cpIn:  n.cpIn  ? {dx:n.cpIn.dx,  dy:n.cpIn.dy}  : null,
        cpOut: n.cpOut ? {dx:n.cpOut.dx, dy:n.cpOut.dy} : null,
        fixed: i===0,
      }));
      states[def.id]={
        def,domEl,period1,phase1,phase2,
        nodes:mnodes,
        role:'stem', boopActive:false,
      };
    } else {
      // Frill/flower: particle — only position + rotation offset
      const n0=nodes[0], nL=nodes[nodes.length-1];
      // Centroid in world coords
      const restCx=(n0.x+nL.x)/2, restCy=(n0.y+nL.y)/2;
      // Rest angle of spine (degrees)
      const restAngle=Math.atan2(nL.y-n0.y, nL.x-n0.x)*RAD2DEG;
      // Perpendicular to spine (for angular impulse from boop)
      const spLen=Math.hypot(nL.x-n0.x,nL.y-n0.y)||1;
      const perpX=-(nL.y-n0.y)/spLen, perpY=(nL.x-n0.x)/spLen;
      // Root world pos (tracks parent)
      const rootX=n0.x, rootY=n0.y;
      const ltx=def.layerTx?def.layerTx.x:0, lty=def.layerTx?def.layerTx.y:0;
      states[def.id]={
        def,domEl,period1,phase1,phase2,
        role:'particle',
        restCx, restCy, restAngle,
        perpX, perpY,
        // local centroid (inside layer transform) — used as rotate pivot
        lCx: restCx-ltx, lCy: restCy-lty,
        // root tracking
        rootX, rootY,       // current root world pos
        rootVx:0, rootVy:0,
        restRootX:rootX, restRootY:rootY,
        // rotation spring
        dAngle:0, va:0,
        boopActive:false,
        cooldownUntil:0,
      };
    }
  });

  // Pre-compute root chain rest offsets
  for(const chain of VD.chains){
    let prevLastRest=null, prevId=chain.stem;
    if(chain.stem){
      const d=byId[chain.stem], ln=d.nodes[d.nodes.length-1];
      prevLastRest={x:ln.x,y:ln.y};
    }
    for(const m of chain.members){
      const st=states[m.id], root=st.def.nodes[0];
      st.rootRestOff=prevLastRest
        ?{dx:root.x-prevLastRest.x, dy:root.y-prevLastRest.y}
        :{dx:0,dy:0};
      st.parentId=prevId;
      const ln=st.def.nodes[st.def.nodes.length-1];
      prevLastRest={x:ln.x,y:ln.y};
      prevId=m.id;
    }
  }

  // Processing order
  const processOrder=[];
  for(const chain of VD.chains){
    if(chain.stem) processOrder.push({id:chain.stem,role:'stem'});
    for(const m of chain.members) processOrder.push({id:m.id,role:'chain'});
  }
  VD.physicsElements.filter(d=>d.physicsType==='circle')
    .forEach(d=>processOrder.push({id:d.id,role:'circle'}));

  // ── Snapshot trail init ────────────────────────────────────────────────
  const PALETTES=[
    ['#f2c62a','#eb7513','#a52c16','#69190d'],
    ['#f2c62a','#5e9a0e','#0e4d0e','#073720'],
    ['#f2c62a','#eb7513','#5e9a0e','#073720'],
  ];
  const stemToChain={};
  VD.chains.forEach(c=>{if(c.stem)stemToChain[c.stem]=c.prefix;});

  // Blur filter defs — 4 levels fresh→old
  const svgDefs=document.querySelector('#jl-ci defs');
  [0.5,1.2,2.2,3.5].forEach((sd,i)=>{
    const f=document.createElementNS('http://www.w3.org/2000/svg','filter');
    f.id='tf'+i;
    f.setAttribute('x','-20%');f.setAttribute('y','-20%');
    f.setAttribute('width','140%');f.setAttribute('height','140%');
    const b=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
    b.setAttribute('stdDeviation',sd);f.appendChild(b);svgDefs.appendChild(f);
  });

  // chainTrail: per-chain snapshot state (live-clone approach)
  const chainTrail={};
  const layer3El=document.getElementById('layer3');
  VD.chains.forEach(chain=>{
    const ids=[chain.stem,...chain.members.map(m=>m.id)].filter(Boolean);
    const firstEl=ids.length?document.getElementById(ids[0]):null;
    const chainParentEl=firstEl?firstEl.parentElement:layer3El;
    chainTrail[chain.prefix]={paletteIdx:null,ids,slots:[],snapsTaken:0,nextSnapTime:0,boopCount:0,parentEl:chainParentEl};
  });

  function takeSnapshot(prefix,ts){
    const ct=chainTrail[prefix];
    const snapIdx=ct.snapsTaken;
    const gradIdx=Math.min(3,Math.floor(snapIdx/Math.max(1,PARAMS.snapCount)*4));
    const color=PALETTES[ct.paletteIdx][gradIdx];
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('fill','none');
    g.setAttribute('stroke',color);
    g.setAttribute('filter','url(#tf'+gradIdx+')');
    g.setAttribute('opacity','1');
    g.setAttribute('pointer-events','none');
    ct.ids.forEach(id=>{
      const liveEl=document.getElementById(id);
      if(!liveEl)return;
      const cl=liveEl.cloneNode(false);
      cl.removeAttribute('id');
      cl.removeAttribute('inkscape:label');
      const sty=(liveEl.getAttribute('style')||'').split(';')
        .filter(s=>!/^\s*(stroke|fill|opacity):/i.test(s)).join(';');
      cl.setAttribute('style',sty);
      g.appendChild(cl);
    });
    const snapParent=(document.getElementById(ct.ids[0])||{parentElement:layer3El}).parentElement||layer3El;
    snapParent.insertBefore(g,snapParent.firstChild);
    ct.slots.push({g,active:true,birthTime:ts});
  }

  // ── Stem path builder ─────────────────────────────────────────────────────
  function buildD(st){
    const {nodes,def}=st, tpl=def.tpl||def.template;
    const ltx=def.layerTx?def.layerTx.x:0, lty=def.layerTx?def.layerTx.y:0;
    let d='',i=0;
    const len=tpl.length;
    while(i<len){
      const tok=tpl[i];
      if(TOKS.has(tok)){
        const ni=tpl[i+1],n=nodes[ni],p=ni>0?nodes[ni-1]:null;
        let val;
        switch(tok){
          case 'nx':    val=n.x-ltx;break;
          case 'ny':    val=n.y-lty;break;
          case 'cp1x':  val=p.x+(p.cpOut?p.cpOut.dx:0)-ltx;break;
          case 'cp1y':  val=p.y+(p.cpOut?p.cpOut.dy:0)-lty;break;
          case 'cpinx': val=n.x+(n.cpIn ?n.cpIn.dx :0)-ltx;break;
          case 'cpiny': val=n.y+(n.cpIn ?n.cpIn.dy :0)-lty;break;
        }
        d += val.toFixed(2);
        i+=2;
      } else {d+=tok;i++;}
    }
    return d;
  }

  // ── Ripple system ──────────────────────────────────────────────────────────
  const rippleLayer=document.getElementById('ripple-layer');
  let ripples=[], mouseVP={x:SVG_W/2,y:SVG_H/2};
  let mouseReady=false, lastAutoRipple=null, lastFrameTs=null;

  const _pt = svgEl.createSVGPoint();

  function getRingSpecs(){
    const dur1=4400*PARAMS.ringDurScale, r1=PARAMS.ring1MaxR;
    return [
      {delay:0,                maxR:r1,                    dur:dur1,sw:2.0,opa0:0.90},
      {delay:PARAMS.ringDelay, maxR:r1*PARAMS.ring2VelRatio, dur:dur1,sw:1.5,opa0:0.70},
    ];
  }

  function createHeartbeat(x,y){
    const rings=getRingSpecs().map(spec=>{
      const el=document.createElementNS('http://www.w3.org/2000/svg','circle');
      el.setAttribute('fill','none');
      el.setAttribute('stroke','#f2c62a');
      el.setAttribute('stroke-width',spec.sw);
      el.setAttribute('filter','url(#ripple-glow)');
      el.setAttribute('cx',x); el.setAttribute('cy',y);
      el.setAttribute('r',0); el.setAttribute('opacity',0);
      return {...spec,el,boopedNodes:new Set(),lastR:null,lastOpa:null};
    });
    rings.forEach(r => rippleLayer.appendChild(r.el));
    ripples.push({x,y,startTs:performance.now(),rings});
  }

  // ── Tick ───────────────────────────────────────────────────────────────────
  function tick(ts){
    requestAnimationFrame(tick);
    if(lastFrameTs===null){lastFrameTs=ts;lastAutoRipple=ts;return;}
    const dt=Math.min(ts-lastFrameTs,50);
    lastFrameTs=ts;
    const dtN=dt/FPS_N;

    if(mouseReady && PARAMS.pulseInterval>0 && ts-lastAutoRipple>=PARAMS.pulseInterval){
      createHeartbeat(mouseVP.x,mouseVP.y);
      lastAutoRipple=ts;
    }

    // ── Ripple rings ───────────────────────────────────────────────────────
    const dead=[];
    const svgScreenMat = svgEl.getScreenCTM();
    if(!svgScreenMat) return;

    for(const rp of ripples){
      const elapsed=ts-rp.startTs;
      let allDone=true;
      for(const ring of rp.rings){
        const re=elapsed-ring.delay;
        if(re<0){allDone=false;continue;}
        if(re>=ring.dur){
          if(ring.lastOpa !== "0") {
            ring.el.setAttribute('opacity',0);
            ring.lastOpa = "0";
          }
          continue;
        }
        allDone=false;
        const lin=re/ring.dur;
        const linPrev=Math.max(0,(re-dt))/ring.dur;
        const currR=ring.maxR*(1-Math.pow(1-lin,3));
        const prevR=ring.maxR*(1-Math.pow(1-linPrev,3));
        
        const rStr = currR.toFixed(2);
        if(ring.lastR !== rStr) {
          ring.el.setAttribute('r',rStr);
          ring.lastR = rStr;
        }
        
        const opa = (ring.opa0*(1-lin)).toFixed(3);
        if(ring.lastOpa !== opa) {
          ring.el.setAttribute('opacity',opa);
          ring.lastOpa = opa;
        }

        // Boop stems (node-level)
        for(const entry of processOrder){
          if(entry.role!=='stem') continue;
          const st=states[entry.id];
          if(!st||!st.nodes) continue;
          
          let rpLx=rp.x,rpLy=rp.y;
          const cp = stemToChain[entry.id];
          const pe = cp ? chainTrail[cp]?.parentEl : null;
          if(pe){
            try {
              const peMat = pe.getScreenCTM();
              if(peMat){
                const inv = peMat.inverse().multiply(svgScreenMat);
                _pt.x=rp.x; _pt.y=rp.y;
                const q = _pt.matrixTransform(inv);
                rpLx=q.x; rpLy=q.y;
              }
            } catch(e) {}
          }

          for(let ni=1;ni<st.nodes.length;ni++){
            const key=entry.id+':'+ni;
            if(ring.boopedNodes.has(key)) continue;
            const n=st.nodes[ni];
            const dist=Math.hypot(n.x-rpLx,n.y-rpLy);
            if(prevR<=dist&&currR>=dist){
              ring.boopedNodes.add(key);
              const ratio=Math.min(dist/ring.maxR,0.999);
              const omt=Math.pow(1-ratio,1/3);
              const spd=ring.maxR*3*omt*omt/ring.dur*FPS_N;
              const prox=0.5+(1-Math.min(dist,600)/600)*0.5;
              const isTip=ni===st.nodes.length-1;
              const scale=isTip?PARAMS.stemTipBoop:1.0;
              const imp=spd*prox*PARAMS.boopImp*scale;
              const dl=dist||1;
              n.vx+=(n.x-rpLx)/dl*imp;
              n.vy+=(n.y-rpLy)/dl*imp;
              st.boopActive=true;
              st.boopTime=ts;
              if(cp&&chainTrail[cp]){
                const ct2=chainTrail[cp]; ct2.boopCount++;
                const fresh=ct2.paletteIdx===null||(PARAMS.trailResetN>0&&ct2.boopCount%PARAMS.trailResetN===0);
                if(fresh){ct2.paletteIdx=Math.floor(Math.random()*3);ct2.snapsTaken=0;ct2.nextSnapTime=ts+PARAMS.snapInterval;}
              }
            }
          }
        }

        // Boop particles (angular impulse)
        for(const entry of processOrder){
          if(entry.role!=='chain') continue;
          const st=states[entry.id];
          if(!st||st.role!=='particle') continue;
          const key=entry.id+':p';
          if(ring.boopedNodes.has(key)||ts<st.cooldownUntil) continue;
          
          let pRpLx=rp.x,pRpLy=rp.y;
          const pe2=st.domEl?.parentElement;
          if(pe2){
            try {
              const pe2Mat = pe2.getScreenCTM();
              if(pe2Mat){
                const inv = pe2Mat.inverse().multiply(svgScreenMat);
                _pt.x=rp.x; _pt.y=rp.y;
                const q = _pt.matrixTransform(inv);
                pRpLx=q.x; pRpLy=q.y;
              }
            } catch(e) {}
          }

          const dist=Math.hypot(st.restCx-pRpLx,st.restCy-pRpLy);
          if(prevR<=dist&&currR>=dist){
            ring.boopedNodes.add(key);
            const ratio=Math.min(dist/ring.maxR,0.999);
            const omt=Math.pow(1-ratio,1/3);
            const spd=ring.maxR*3*omt*omt/ring.dur*FPS_N;
            const prox=0.5+(1-Math.min(dist,600)/600)*0.5;
            const imp=spd*prox*PARAMS.boopImp;
            const dl=dist||1;
            const bx=(st.restCx-pRpLx)/dl, by=(st.restCy-pRpLy)/dl;
            const angImp=(bx*st.perpX+by*st.perpY)*imp;
            st.va+=angImp*RAD2DEG;
            st.boopActive=true;
            st.cooldownUntil=ts+2000;
          }
        }

        // Boop circles
        for(const def of VD.physicsElements){
          if(def.elType!=='circle') continue;
          const st=states[def.id];
          const key=def.id+':c';
          if(ring.boopedNodes.has(key)||ts<st.cooldownUntil) continue;
          const dist=Math.hypot(def.cx-rp.x,def.cy-rp.y);
          if(prevR<=dist&&currR>=dist){
            ring.boopedNodes.add(key);
            const ratio=Math.min(dist/ring.maxR,0.999);
            const omt=Math.pow(1-ratio,1/3);
            const spd=ring.maxR*3*omt*omt/ring.dur*FPS_N;
            const prox=0.5+(1-Math.min(dist,600)/600)*0.5;
            st.sv+=spd*prox*PARAMS.boopImp*def.boopMax;
            st.boopActive=true;
            st.holdUntil=ts+def.holdMs;
            st.cooldownUntil=ts+2000;
          }
        }
      }
      if(allDone){
        for(const ring of rp.rings) rippleLayer.removeChild(ring.el);
        dead.push(rp);
      }
    }
    ripples=ripples.filter(r=>!dead.includes(r));

    // ── Physics ────────────────────────────────────────────────────────────
    for(const entry of processOrder){
      const st=states[entry.id];
      if(!st) continue;

      if(entry.role==='circle'){
        const def=st.def;
        const p2=st.period1*PHI;
        const ir=0.6*Math.sin(PI2*ts/st.period1+st.phase1)
                +0.4*Math.sin(PI2*ts/p2        +st.phase2);
        const it=def.idleAmp*ir;
        st.sv+=-def.stiffness*(st.sOff-it)*dtN;
        const bd=st.boopActive&&ts>=st.holdUntil?PARAMS.vineDecayMult:1;
        st.sv*=Math.pow(def.damping,dtN*bd);
        st.sOff+=st.sv*dtN;
        if(st.boopActive&&ts>=st.holdUntil&&Math.abs(st.sOff-it)<def.boopMax*0.003)
          st.boopActive=false;
        const s=1+st.sOff;
        const sStr = s.toFixed(4);
        if(st.lastS !== sStr) {
          st.domEl.setAttribute('transform',
            `translate(${st.lpx},${st.lpy}) scale(${sStr}) translate(${-st.lpx},${-st.lpy})`);
          st.lastS = sStr;
        }
        continue;
      }

      const def=st.def;
      const p2=st.period1*PHI;
      const ir=0.6*Math.sin(PI2*ts/st.period1+st.phase1)
              +0.4*Math.sin(PI2*ts/p2        +st.phase2);

      if(entry.role==='stem'){
        const nodes=st.nodes, nc=nodes.length;
        const smult=st.boopActive?PARAMS.vineDecayMult:1;
        for(let i=1;i<nc;i++){
          const n=nodes[i];
          const t=nc<=2?1:(i-1)/(nc-2);
          const sk=lerp(PARAMS.stemBodyStiff,PARAMS.stemTipStiff,t);
          const sd=lerp(PARAMS.stemBodyDamp, PARAMS.stemTipDamp, t);
          if(i===nc-1){
            const bdir=ir*def.idleAmp*0.05;
            n.vx+=bdir*dtN; n.vy+=bdir*dtN;
          }
          n.vx+=-sk*smult*(n.x-n.restX)*dtN;
          n.vy+=-sk*smult*(n.y-n.restY)*dtN;
          const d=Math.pow(sd,dtN);
          n.vx*=d; n.vy*=d;
          n.x+=n.vx*dtN; n.y+=n.vy*dtN;
        }
        if(st.boopActive){
          const maxD=nodes.reduce((m,n)=>Math.max(m,Math.hypot(n.x-n.restX,n.y-n.restY)),0);
          if(maxD<0.2&&ts-st.boopTime>200){
            st.boopActive=false;
          }
        }
        const dStr = buildD(st);
        if(st.lastD !== dStr) {
          st.domEl.setAttribute('d', dStr);
          st.lastD = dStr;
        }
        continue;
      }

      if(entry.role==='chain' && st.role==='particle'){
        const pst=states[st.parentId];
        let pLastX, pLastY;
        if(pst.role==='stem'){
          const pn=pst.nodes;
          pLastX=pn[pn.length-1].x; pLastY=pn[pn.length-1].y;
        } else {
          const pdef=pst.def, pnodes=pdef.nodes;
          const pdx=pnodes[pnodes.length-1].x-pnodes[0].x;
          const pdy=pnodes[pnodes.length-1].y-pnodes[0].y;
          pLastX=pst.rootX+pdx; pLastY=pst.rootY+pdy;
        }
        const targX=pLastX+st.rootRestOff.dx;
        const targY=pLastY+st.rootRestOff.dy;
        const smult=st.boopActive?PARAMS.vineDecayMult:1;
        const rk=PARAMS.rootChainK*smult;
        st.rootVx+=-rk*(st.rootX-targX)*dtN;
        st.rootVy+=-rk*(st.rootY-targY)*dtN;
        st.rootVx*=Math.pow(PARAMS.frillDamp,dtN);
        st.rootVy*=Math.pow(PARAMS.frillDamp,dtN);
        st.rootX+=st.rootVx*dtN;
        st.rootY+=st.rootVy*dtN;

        const dFromTarg=Math.hypot(st.rootX-targX,st.rootY-targY);
        if(dFromTarg>PARAMS.rootChainMax){
          const sc=PARAMS.rootChainMax/dFromTarg;
          st.rootX=targX+(st.rootX-targX)*sc;
          st.rootY=targY+(st.rootY-targY)*sc;
          st.rootVx*=0.5; st.rootVy*=0.5;
        }

        st.va+=ir*def.idleAmp*PARAMS.breezeF*dtN;
        st.va+=-def.stiffness*smult*st.dAngle*dtN;
        st.va*=Math.pow(PARAMS.frillDamp,dtN);
        st.dAngle+=st.va*dtN;
        st.dAngle=Math.max(-PARAMS.frillMaxRot,Math.min(PARAMS.frillMaxRot,st.dAngle));

        if(st.boopActive&&Math.abs(st.dAngle)<0.3&&Math.abs(st.va)<0.05)
          st.boopActive=false;

        const rootDx=st.rootX-st.restRootX;
        const rootDy=st.rootY-st.restRootY;
        
        const dxStr = rootDx.toFixed(2), dyStr = rootDy.toFixed(2), angStr = st.dAngle.toFixed(2);
        const lcxStr = st.lCx.toFixed(2), lcyStr = st.lCy.toFixed(2);
        const transHash = dxStr + dyStr + angStr + lcxStr + lcyStr;
        if(st.lastTrans !== transHash) {
          st.domEl.setAttribute('transform',
            `translate(${dxStr},${dyStr}) rotate(${angStr},${lcxStr},${lcyStr})`);
          st.lastTrans = transHash;
        }
        continue;
      }
    }

  // ── Snapshot trigger — runs every frame inside tick ─────────────────────
  for(const [prefix,ct] of Object.entries(chainTrail)){
    if(ct.paletteIdx===null||ct.snapsTaken>=PARAMS.snapCount)continue;
    if(ts>=ct.nextSnapTime){
      takeSnapshot(prefix,ts);
      ct.snapsTaken++;
      ct.nextSnapTime=ts+PARAMS.snapInterval;
      if(ct.snapsTaken>=PARAMS.snapCount) ct.paletteIdx=null;
    }
  }

  // ── Snapshot fade update ──────────────────────────────────────────────────
  for(const ct of Object.values(chainTrail)){
    for(let si=ct.slots.length-1;si>=0;si--){
      const slot=ct.slots[si];
      const age=ts-slot.birthTime;
      if(age>=PARAMS.snapDecay){
        slot.g.remove();
        ct.slots.splice(si,1);
      } else {
        slot.g.setAttribute('opacity',Math.pow(1-age/PARAMS.snapDecay,1.5).toFixed(3));
      }
    }
  } // fade

  } // tick

  // ── Input ──────────────────────────────────────────────────────────────────
  function svgCoords(cx,cy){
    const r=svgEl.getBoundingClientRect();
    return {x:(cx-r.left)/r.width*SVG_W, y:(cy-r.top)/r.height*SVG_H};
  }
  const cont=document.getElementById('container');
  cont.addEventListener('mousemove',e=>{
    const c=svgCoords(e.clientX,e.clientY);
    mouseVP.x=c.x; mouseVP.y=c.y;
    if(!mouseReady){mouseReady=true;lastAutoRipple=performance.now();}
  });
  cont.addEventListener('click',e=>{
    const c=svgCoords(e.clientX,e.clientY);
    createHeartbeat(c.x,c.y);
    lastAutoRipple=performance.now(); mouseReady=true;
  });
  cont.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0],c=svgCoords(t.clientX,t.clientY);
    mouseVP.x=c.x; mouseVP.y=c.y; mouseReady=true;
    createHeartbeat(c.x,c.y); lastAutoRipple=performance.now();
  },{passive:false});
  cont.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.touches[0],c=svgCoords(t.clientX,t.clientY);
    mouseVP.x=c.x; mouseVP.y=c.y;
  },{passive:false});

  requestAnimationFrame(tick);
})();

</script>
</body>
</html>
