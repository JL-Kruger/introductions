blocks:

  - type: heading
    level: 1
    text: "Collaborators and Communities"

  - type: special
    text: >
      As I have gone careering through my journey on this planet, I have always
      found fantastic collaborators who bring both joy and sincere engagement to
      every project. Listed below are some (but certainly not all) of the
      communities and collaborators that I have encountered and engaged with
      over the years.

  - type: image
    src: /Media/Images/jl-site-pic-communities.webp
    alt-text: "A photo of a mixed-media artwork I made as a gift to my dad, featuring hunters in red, blue, and gold (among other less prominent colors)."

  - type: separator
    svg: jl-site-separator7.svg

  - type: heading
    level: 2
    text: "Sentella and Jozi Burners"

  - type: image
    src: /Media/Images/jl-site-thumbnail-raft.webp
    alt-text: "A tree that I built for Sentella 2019. A storm tore it down. We set fire to it anyway."

  - type: heading
    level: 3
    text: "Sentella"

  - type: paragraph
    text: >
      Sentella is an art community that throws a little week-long festival
      somewhere in-or-near Gauteng every year (the venues change from time to
      time), while the Jozi Burners are the volunteer corps that keep the
      Gauteng-based burners connected through regular gatherings, outreach events
      and training days. I'm an active member of these communities, and I can
      guarantee that anyone you talk to here will know who I am. I have no idea
      what their opinions are, but I am sure they will be happy to voice them.

  - type: image
    src: /Media/Images/jl-site-pic-Sentella.webp
    alt-text: "A dwagon I made wif my favowite"

  - type: button
    text: Sentella's Website
    href: https://sentella.co.za/

  - type: link-row
