  - type: heading
    level: 2
    text: "The Freelance Collective"

  - type: paragraph
    text: >
      Since my entertainment days, I have moderated, administered, and provided
      support on many small WhatsApp groups, Discord servers and other online
      communities.

  - type: image
    src: /Media/Images/WorkHistory-gallery/jl-site-gallery-workhistory16.webp
    alt-text: "A luta continua.'"

  - type: paragraph
    text: >
      As of March 2026, I am serving as the lead community admin for the Freelance
      Collective, a growing cohort of motivated and connected multi-skilled and
      entrepreneurial problem solvers. The WhatsApp Community maintains an online
      space for finding work, showcasing work, organizing cool stuff and generally
      helping each other navigate this economy. It is built on the values of
      solidarity, trust, and respect.

  - type: paragraph
    text: "Remember to read the rules. Join Here:"

  - type: button
    text: Freelance Collective - WhatsApp Invite
    href: "https://chat.whatsapp.com/LcP68UVfxNWFBMGGbKcH3M"

  - type: separator
