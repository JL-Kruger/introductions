# tags: design-tokens variables build-constants
# variables.yaml — THE design-system source of truth (look & feel).
# Human-authored. Consumed by builder_common.py to generate, at build time:
#   • the shared gradient <defs> SVG  (shared_defs_svg)
#   • the Google-fonts <link>          (head_block)
#   • /css/tokens.css  :root{}          (palette + layout custom properties)
#
# Companion file site.yaml owns CONTENT/STRUCTURE (meta, navbar, page layouts,
# cards). Look lives here; what's-on-the-page lives there. Run the relevant
# builder after editing either file.
#
# Values below are reconciled (2026-06-09) to match the real runtime consumers:
#   gradients ← builder_common _SHARED_DEFS ; rotation ← js/shimmer.js
#   pretext px/edge ← js/pretext-engine.js  ; layout ← css/content-page.css
#   palette ← css :root  ; fonts ← builder_common _GOOGLE_FONTS

# ─────────────────────────────────────────────────────────────────────────────
# Colors
# ─────────────────────────────────────────────────────────────────────────────
colors:
  # Palette → emitted verbatim as :root custom properties (--soil, --fire, …).
  palette:
    soil:    "#442204"
    pigment: "#69190d"
    rust:    "#a52c16"
    fire:    "#eb7513"
    sun:     "#f2c62a"
    light:   "#e8e2da"
    meadow:  "#5e9a0e"
    forest:  "#0e4d0e"
    jungle:  "#073720"

  # Semantic roles (reference; mirrors pretext-engine COLORS + CSS link rules).
  roles:
    text_primary:    light    # body copy
    text_h1:         fire
    text_h2_h3:      meadow
    text_h4_h6:      rust
    text_blockquote: sun
    link_default:    meadow
    link_hover:      fire
    link_visited:    rust

# ─────────────────────────────────────────────────────────────────────────────
# Background — static, no animation. dark → green, top → bottom.
# ─────────────────────────────────────────────────────────────────────────────
background:
  css:        "linear-gradient(180deg, #010403 0%, #02130a 100%)"
  attachment: fixed

# ─────────────────────────────────────────────────────────────────────────────
# Typography
# ─────────────────────────────────────────────────────────────────────────────
typography:
  fonts:
    h1:      "Tagesschrift"
    h2_h6:   "Walter Turncoat"
    body:    "Overlock"
    mono:    "Courier New"
    special: "Protest Revolution"   # assigned to specific elements in builders

  # Google Fonts <link> is generated by joining these. The full emitted URL is:
  #   https://fonts.googleapis.com/css2?family={base}&family={each family}&display={display}
  google_fonts:
    base:     "Overlock:ital,wght@0,400;0,700;1,400"
    families: ["Tagesschrift", "Walter+Turncoat", "Protest+Revolution"]
    display:  swap

  # Pixel sizes used by the Pretext canvas engine on CONTENT pages
  # (js/pretext-engine.js CONFIG.FONTS). Hub/home use responsive CSS clamp()
  # sizes instead — those live in the CSS, not here.
  pretext_px:
    base:        18      # paragraph; line_height 1.5 → BASE_LINE_PX 27
    line_height: 1.5
    h1:          50
    h2:          32
    h3:          24
    h4:          22
    h5:          20
    h6:          18
    special:     21      # also used for quote/blockquote
    mono:        15

# ─────────────────────────────────────────────────────────────────────────────
# Gradients
# Stop palettes and the gradient defs are separated so a gradient's COLORS
# (which stop-set) are independent of whether it ROTATES. Opacities are stored
# as exact strings to reproduce the shipped <defs> byte-for-byte.
# All gradients use gradientUnits="objectBoundingBox"; rotation pivots at 0.5,0.5.
# ─────────────────────────────────────────────────────────────────────────────
gradients:
  # axis h → x1=0 y1=.5 x2=1 y2=.5 ; axis v → x1=.5 y1=0 x2=.5 y2=1
  stop_sets:
    rainbow:
      - { offset: "0%",   color: "#000",    opacity: "0"    }
      - { offset: "10%",  color: "#442204", opacity: ".22"  }
      - { offset: "20%",  color: "#69190d", opacity: ".439" }
      - { offset: "33%",  color: "#a52c16", opacity: ".659" }
      - { offset: "44%",  color: "#eb7513", opacity: ".878" }
      - { offset: "55%",  color: "#f2c62a", opacity: "1"    }
      - { offset: "66%",  color: "#5e9a0e", opacity: ".878" }
      - { offset: "77%",  color: "#0e4d0e", opacity: ".659" }
      - { offset: "88%",  color: "#073720", opacity: ".439" }
      - { offset: "94%",  color: "#442204", opacity: ".22"  }
      - { offset: "100%", color: "#000",    opacity: "0"    }
    white:
      - { offset: "0%",   color: "#e8e2da", opacity: "0" }
      - { offset: "50%",  color: "#e8e2da", opacity: "1" }
      - { offset: "100%", color: "#e8e2da", opacity: "0" }
    nav:
      - { offset: "0%",    color: "#073720", opacity: "0"   }
      - { offset: "16.7%", color: "#0e4d0e", opacity: ".44" }
      - { offset: "33.3%", color: "#5e9a0e", opacity: ".88" }
      - { offset: "50%",   color: "#f2c62a", opacity: "1"   }
      - { offset: "66.7%", color: "#eb7513", opacity: ".88" }
      - { offset: "83.3%", color: "#69190d", opacity: ".44" }
      - { offset: "100%",  color: "#073720", opacity: "0"   }
    # Ember (warm) — soil→rust→fire→sun→fire→rust→soil — mirrors starfield EMBER palette
    ember:
      - { offset: "0%",   color: "#000",    opacity: "0"   }
      - { offset: "12%",  color: "#442204", opacity: ".15" }   # soil
      - { offset: "28%",  color: "#a52c16", opacity: ".55" }   # rust
      - { offset: "44%",  color: "#eb7513", opacity: ".88" }   # fire
      - { offset: "55%",  color: "#f2c62a", opacity: "1"   }   # sun (peak)
      - { offset: "66%",  color: "#eb7513", opacity: ".88" }   # fire
      - { offset: "80%",  color: "#a52c16", opacity: ".45" }   # rust
      - { offset: "92%",  color: "#442204", opacity: ".15" }   # soil
      - { offset: "100%", color: "#000",    opacity: "0"   }
    # Spectral (cool) — jungle→forest→meadow→light→meadow→forest→jungle — mirrors starfield SPEC palette
    spectral:
      - { offset: "0%",   color: "#000",    opacity: "0"   }
      - { offset: "12%",  color: "#073720", opacity: ".15" }   # jungle
      - { offset: "28%",  color: "#0e4d0e", opacity: ".40" }   # forest
      - { offset: "44%",  color: "#5e9a0e", opacity: ".80" }   # meadow
      - { offset: "55%",  color: "#e8e2da", opacity: "1"   }   # light (peak — icy shimmer)
      - { offset: "66%",  color: "#5e9a0e", opacity: ".80" }   # meadow
      - { offset: "80%",  color: "#0e4d0e", opacity: ".35" }   # forest
      - { offset: "92%",  color: "#073720", opacity: ".15" }   # jungle
      - { offset: "100%", color: "#000",    opacity: "0"   }

  # Emission order matches the shipped _SHARED_DEFS. `rotates` mirrors
  # js/shimmer.js GRAD_IDS; phase_offset_deg only applies when rotates: true.
  defs:
    - { id: shimmer-org-h,    stops: rainbow,   axis: h, rotates: true,  phase_offset_deg: 0   }
    - { id: shimmer-org-v,    stops: rainbow,   axis: v, rotates: true,  phase_offset_deg: 90  }
    - { id: shimmer-geo,      stops: rainbow,   axis: h, rotates: true,  phase_offset_deg: 44  }
    - { id: shimmer-sta,      stops: white,     axis: h, rotates: true,  phase_offset_deg: 88  }
    - { id: shimmer-oth,      stops: rainbow,   axis: h, rotates: true,  phase_offset_deg: 144 }
    - { id: shimmer-ember,    stops: ember,     axis: h, rotates: true,  phase_offset_deg: 22  }   # warm ember glow stroke
    - { id: shimmer-spectral, stops: spectral,  axis: h, rotates: true,  phase_offset_deg: 110 }   # cool spectral glow stroke
    - { id: shine-org-h,      stops: white,     axis: h, rotates: false }   # static rest-state
    - { id: shimmer-nav,      stops: nav,       axis: h, rotates: false }   # static

  # How the builder assigns a gradient id to an inlined SVG by group label.
  offset_assignment:
    organics:   "height > width → shimmer-org-v, else shimmer-org-h"
    geometrics: shimmer-geo
    statics:    shimmer-sta

# ─────────────────────────────────────────────────────────────────────────────
# Animation — rAF loop in js/shimmer.js (reference mirror).
# ─────────────────────────────────────────────────────────────────────────────
animation:
  raf_speeds:
    base:  { period_sec: 22,   deg_per_sec: 16.36 }
    hover: { period_sec: 8,    deg_per_sec: 45.00 }
    click: { period_sec: 0.88, deg_per_sec: 409.09 }
  click_reset_ms:     880
  scroll_contribution: 0.025      # gradAngle += scrollDelta * 0.025
  excluded_from_rotation: [shine-org-h, shimmer-nav, text]

# ─────────────────────────────────────────────────────────────────────────────
# Layout — emitted as :root custom properties for content pages.
# ─────────────────────────────────────────────────────────────────────────────
layout:
  sidebar_w:       "22vw"
  logo_h:          "30vh"     # logo area height at top of sidebar column
  content_max_w:   "680px"
  content_pad_v:   "42vh"     # top/bottom padding on #content-area
  lh:              1.5
  nav_height_approx_px: 60
  pretext:
    edge:          0.60       # stable-zone boundary (CONFIG.EDGE); sizes IO rootMargin
    base_line_px:  27         # 18px × 1.5 (CONFIG.BASE_LINE_PX)

# ─────────────────────────────────────────────────────────────────────────────
# Scale — the design system's spacing/type/measure spine. Computed by
# builder_common.tokens_css() into clamp()/calc() :root custom properties.
# Full rationale + the resolved values + layout primitives + container-query
# strategy live in LAYOUT-SPEC.md (consumed by Phase 3). Palette + fonts are
# NOT touched by anything here — this is geometry only.
# ─────────────────────────────────────────────────────────────────────────────
scale:
  # Fluid type ramp. Each --step-N is clamp(min, fluid, max), interpolated
  # linearly between viewport_min_px and viewport_max_px. min = base_min ×
  # ratio_min^N (mobile, tighter ratio); max = base_max × ratio_max^N (desktop,
  # looser ratio). rem reference is the 16px browser root (we never override it,
  # so user font-size prefs are honoured). base_max 18 == pretext body px.
  type:
    viewport_min_px: 360
    viewport_max_px: 1240
    base_min_px:     16        # body (--step-0) at 360px
    base_max_px:     18        # body (--step-0) at 1240px
    ratio_min:       1.2       # minor third (mobile)
    ratio_max:       1.25      # major third (desktop)
    steps:           [-1, 0, 1, 2, 3, 4, 5, 6]
  # Vertical rhythm spacing, locked to the body line. --rhythm = --step-0 × --lh
  # (the height of one line of body text). Every --space-* is a multiple of that
  # rhythm unit, so stacked margins always tile the baseline grid. Because
  # --step-0 is fluid, the whole spacing scale scales fluidly with no extra
  # clamps. Keys map to --space-<key>; values are rhythm multiples.
  spacing:
    "3xs": 0.25
    "2xs": 0.5
    "xs":  0.75
    "s":   1
    "m":   1.5
    "l":   2
    "xl":  3
    "2xl": 4
    "3xl": 6
  measure: "42rem"             # ~672px ideal prose line length (--measure)
