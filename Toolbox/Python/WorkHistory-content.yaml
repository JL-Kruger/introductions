  - type: heading
    level: 2
    text: "Operations, Governance & Regulatory Compliance (2022–2024)"

  - type: paragraph
    text: >
      I spent two years as an **assistant to a court-appointed administrator**
      for a large sectional title scheme. I managed the indexing, validation, and
      drafting of reports for submission to the High Court, ensuring 100%
      accuracy. The work required navigating complex stakeholder relationships and
      legal frameworks while maintaining operational integrity in a difficult and
      challenging environment.

  - type: media
    src: "https://drive.google.com/file/d/1kd_IidjPYTviWGEOe1VNkoVpM9UrtMum/preview"
    text: "View sample Court Report"
    caption: >
      This is a sample of one of the reports I drafted. I have sanitized the
      document and cut the appendices for brevity and privacy protection.
      I can provide the original Word document with tracked changes on request.

