  - type: special
    text: "I have a particular set of skills that transfer across many domains quite well. Here is the shortest, simplest and least comprehensive list."

  - type: image
    src: /Media/Images/jl-site-logo-fancy.svg

  - type: paragraph
    text: >
      First and foremost, is a mastery of the English language, coupled with a broad internal reference library of the history of systems and the connections between them. I am an excellent communicator (even when I have chosen to be somewhat obtuse).
      Second, is an understanding of people, relationships, and values, that facilitates a capacity to motivate and mediate between members of diverse teams.
      Third, is an attention to detail mixed with a persistence of purpose that yields a capacity for creative and complex problem solving (and creatively complex wordplay) that I have found quite valuable in difficult circumstances.
      Fourth, is a resourcefulness and resilience that allows me to make the most of what's available and avoid wasteful and costly mistakes.
      Finally, I cannot call this a skill (except maybe in how I apply it), but it is central to my work: I am steadfastly committed to fostering the values of trust, respect and freedom in myself, the teams I work within, and the world we are all working toward in one way or another.

