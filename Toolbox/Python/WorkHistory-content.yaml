  - type: heading
    level: 2
    text: "Education and Entertainment Systems Design (Early 2025 – Present)"

  - type: paragraph
    text: >
      Alongside surviving the current economy, since early 2025 I have been
      researching, developing and deploying the **(: DON'T PANIC :)** community
      course, the first step of the 3SC Foundations initiative, which is being
      designed to bridge the digital divide for vulnerable populations in
      resource-constrained environments. **(: DON'T PANIC :)** is aimed at the
      knowledge gaps for average users that leave them vulnerable to bad actors
      at the intersection of smartphones, the social internet, and AI. The course
      is gearing up to start beta testing in late May, through August of 2026.

  - type: image
    src: /Media/Images/WorkHistory-gallery/jl-site-gallery-workhistory22.webp
    alt-text: "A flyer for the first round of prototypes"

  - type: button
    text: Visit 3SC — DON'T PANIC
    href: https://jl-kruger.github.io/panic-not

  - type: heading
    level: 2
    text: "Freelance Multimedia and Community Work (2022–Present)"

  - type: paragraph
    text: >
      My freelance work spans voice work, graphic design and administrative
      support, through web development and deployment, producing live shows,
      building set pieces, short-to-medium term project management, and both
      proposal and report writing. While my preference is always to work with a
      team, I have all the core competencies to manage complex projects solo. If
      I say it needs a team to do it, that's because it cannot be done alone.

