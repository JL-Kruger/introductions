  - type: heading
    level: 2
    text: "Digital Transformation & Educational Multimedia Production (2019–2021)"

  - type: paragraph
    text: >
      My appointment as **Head of Media at
      [The Learning Organisation](https://www.tlo.co.za) (TLO)** coincided with
      the COVID-19 lockdowns in South Africa. As such, I spent the pandemic helping
      the team at TLO rapidly retool and adjust from in-person only teaching, to
      remote and hybrid teaching. Once the transition was complete, my role moved
      to high-volume multimedia project management and "on-the-job" technical
      training for learners on learnerships at TLO, as well as teaching Digital
      Marketing. I also built their website at the time.

