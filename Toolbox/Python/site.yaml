          thumbnail: /Media/Images/jl-site-thumbnail-portrait.webp
      - h3: "What may, in some savage and uncivilised quarters, be referred to as essays, provided the appropriate condescension is exorcised."

    bento_right:
      - card:
          style: static
          label: "Contact Information"
          href: /Content/Business/ContactPage.html
          description: "Let's Collaborate"
